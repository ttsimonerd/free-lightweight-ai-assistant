name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # lets you trigger the build manually from the GitHub website

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Java 17 (required by Android Gradle Plugin 8.x)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Set up Gradle 8.6 (downloads it automatically – no wrapper jar needed)
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      # 4. Cache Gradle dependencies to speed up future builds
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: gradle-

      # 5. Build the debug APK
      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      # 6. Upload the APK so you can download it from the GitHub Actions page
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HomeAI-Assistant-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30   # APK stays available for 30 days
